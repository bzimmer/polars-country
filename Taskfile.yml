version: "3"

vars:
  VENV_PYTHON: "{{.TASKFILE_DIR}}/.venv/bin/python"

tasks:
  default:
    cmds:
      - task -l --sort alphanumeric

  clean:
    desc: Remove build artifacts (Rust target/ and Python cache files)
    cmds:
      - cargo clean
      - fd -t d -H '__pycache__|\.egg-info$|\.pytest_cache' -x rm -rf

  _deps:
    internal: true
    sources:
      - pyproject.toml
      - uv.lock
    cmds:
      - uv sync --no-install-project

  build:
    desc: Compile the Rust extension and install it into the venv
    deps: [_deps]
    sources:
      - src/**/*.rs
      - Cargo.toml
      - Cargo.lock
    cmds:
      - uv run maturin develop --release

  fmt:
    desc: Format Python (ruff) and Rust (cargo fmt) source
    cmds:
      - uv run ruff format .
      - uv run ruff check --select I --fix .
      - cargo fmt

  install:
    desc: Build a release wheel and install it into the current venv
    deps: [release]
    cmds:
      - uv pip install target/wheels/polars_country-*.whl --force-reinstall

  release:
    desc: Build a release wheel into target/wheels/
    deps: [test]
    cmds:
      - uv run maturin build --release

  tag:
    desc: Bump version, commit, and create a git tag (e.g. task tag VERSION=0.2.0)
    requires:
      vars: [VERSION]
    cmds:
      - uv version {{.VERSION}}
      - sed -i '' 's/^version = "[^"]*"/version = "{{.VERSION}}"/' Cargo.toml
      - git add pyproject.toml Cargo.toml uv.lock
      - git diff --cached --quiet || git commit -m "release v{{.VERSION}}"
      - git tag v{{.VERSION}}
      - git push origin v{{.VERSION}}

  test:
    desc: Run Rust unit tests and Python pytest suite
    deps: [build]
    cmds:
      - PYO3_PYTHON={{.VENV_PYTHON}} cargo test
      - uv run pytest -v
